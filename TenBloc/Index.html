<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TenBloc Multiplayer</title>
<style>
  body { margin:0; overflow:hidden; background:#111; font-family:sans-serif; color:white; }

  #ui {
    position:fixed; top:10px; left:10px;
    background:rgba(0,0,0,0.6); padding:10px;
    border-radius:6px; z-index:10;
    width:260px;
    font-size:14px;
  }

  #chatBox {
    position:fixed; bottom:10px; left:10px;
    width:300px; background:rgba(0,0,0,0.6);
    padding:10px; border-radius:6px; z-index:10;
  }

  #chatLog {
    height:150px; overflow-y:auto; font-size:14px;
    margin-bottom:10px;
  }

  input {
    width:100%; padding:8px; border:none; border-radius:4px;
  }

  /* MOBILE CONTROLS */
  #mobileControls {
    position:fixed;
    bottom:20px;
    left:20px;
    width:160px;
    height:160px;
    display:none;
    z-index:20;
  }

  #joystickBase {
    width:160px;
    height:160px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    position:relative;
  }

  #joystick {
    width:60px;
    height:60px;
    background:rgba(255,255,255,0.3);
    border-radius:50%;
    position:absolute;
    left:50px;
    top:50px;
  }

  #jumpBtn {
    position:fixed;
    bottom:40px;
    right:40px;
    width:80px;
    height:80px;
    background:rgba(255,255,255,0.3);
    border-radius:50%;
    display:none;
    z-index:20;
    text-align:center;
    line-height:80px;
    font-size:20px;
    color:white;
  }
</style>
</head>
<body>

<div id="ui">
  <div><b>Status:</b> <span id="status">Connecting...</span></div>
  <div id="playerList"><b>Players:</b><br></div>
  <div style="margin-top:10px;">
    <b>Room:</b> <span id="roomName">default</span>
  </div>
</div>

<div id="chatBox">
  <div id="chatLog"></div>
  <input id="chatInput" placeholder="Type message..." />
</div>

<!-- MOBILE CONTROLS -->
<div id="mobileControls">
  <div id="joystickBase">
    <div id="joystick"></div>
  </div>
</div>

<div id="jumpBtn">JUMP</div>

<canvas id="gameCanvas"></canvas>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
// ===============================
// LOGIN CHECK
// ===============================
const activeUser = localStorage.getItem("TenBlocActiveUser");
if (!activeUser) {
  alert("You must log in first.");
  window.location.href = "players.html";
}

function loadPlayers() {
  const raw = localStorage.getItem("TenBlocPlayers");
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}

function getPlayerData(username) {
  const players = loadPlayers();
  return players.find(p => p.username === username);
}

const me = getPlayerData(activeUser);

// ===============================
// MOBILE DETECTION
// ===============================
function isMobile() {
  return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

// ===============================
// THREE.JS SETUP
// ===============================
const canvas = document.getElementById("gameCanvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color("#87CEEB");

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(10,20,10);
scene.add(dir);

// Ground
const groundGeo = new THREE.BoxGeometry(50,1,50);
const groundMat = new THREE.MeshStandardMaterial({ color:"#55aa55" });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.set(0,-0.5,0);
scene.add(ground);

// ===============================
// PLAYER OBJECTS
// ===============================
const players = {}; // username -> { mesh, x,y,z }

function createCapsule(username, data) {
  const color = data?.cosmetics?.bodyColor || "#ffffff";
  const geo = new THREE.CapsuleGeometry(0.4,1.2,8,16);
  const mat = new THREE.MeshStandardMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);

  if (data?.cosmetics?.hat === "hat1") {
    const hatGeo = new THREE.ConeGeometry(0.5,1,16);
    const hatMat = new THREE.MeshStandardMaterial({ color:"#ffdd00" });
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.set(0,1.6,0);
    mesh.add(hat);
  }

  mesh.position.set(0,1,0);
  scene.add(mesh);

  players[username] = { mesh, x:0, y:1, z:0 };
}

// Create local player
createCapsule(activeUser, me);

// ===============================
// CAMERA CONTROL
// ===============================
let camRotY = 0;
let camRotX = 0;

window.addEventListener("mousemove", e => {
  if (!isMobile() && e.buttons === 1) {
    camRotY -= e.movementX * 0.003;
    camRotX -= e.movementY * 0.003;
    camRotX = Math.max(-1.2, Math.min(1.2, camRotX));
  }
});

// MOBILE CAMERA DRAG
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, { passive:false });

document.addEventListener("touchmove", e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;

    camRotY -= dx * 0.003;
    camRotX -= dy * 0.003;
    camRotX = Math.max(-1.2, Math.min(1.2, camRotX));

    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, { passive:false });

const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ===============================
// MOBILE JOYSTICK
// ===============================
let joyActive = false;
let joyX = 0;
let joyY = 0;

const joy = document.getElementById("joystick");
const joyBase = document.getElementById("joystickBase");

joyBase.addEventListener("touchstart", () => joyActive = true, { passive:false });
joyBase.addEventListener("touchend", () => {
  joyActive = false;
  joy.style.left = "50px";
  joy.style.top = "50px";
  joyX = 0;
  joyY = 0;
}, { passive:false });

joyBase.addEventListener("touchmove", e => {
  const rect = joyBase.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;

  const dx = x - 80;
  const dy = y - 80;

  const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
  const angle = Math.atan2(dy, dx);

  joy.style.left = (80 + Math.cos(angle)*dist - 30) + "px";
  joy.style.top = (80 + Math.sin(angle)*dist - 30) + "px";

  joyX = Math.cos(angle) * (dist / 60);
  joyY = Math.sin(angle) * (dist / 60);
}, { passive:false });

// ===============================
// MOVEMENT
// ===============================
function updateLocalMovement(dt) {
  const mePl = players[activeUser];
  if (!mePl) return;

  const speed = 6;
  const forward = new THREE.Vector3(Math.sin(camRotY),0,Math.cos(camRotY));
  const right = new THREE.Vector3(Math.sin(camRotY+Math.PI/2),0,Math.cos(camRotY+Math.PI/2));

  let move = new THREE.Vector3(0,0,0);

  if (!isMobile()) {
    if (keys["w"]) move.add(forward);
    if (keys["s"]) move.sub(forward);
    if (keys["a"]) move.sub(right);
    if (keys["d"]) move.add(right);
  }

  if (isMobile()) {
    move.add(forward.clone().multiplyScalar(-joyY));
    move.add(right.clone().multiplyScalar(joyX));
  }

  if (move.length() > 0) {
    move.normalize();
    move.multiplyScalar(speed * dt);
  }

  mePl.x += move.x;
  mePl.z += move.z;

  mePl.mesh.position.set(mePl.x, mePl.y, mePl.z);
}

// ===============================
// MOBILE JUMP
// ===============================
document.getElementById("jumpBtn").addEventListener("touchstart", () => {
  const mePl = players[activeUser];
  if (!mePl) return;
  mePl.y += 0.5;
});

// ===============================
// CAMERA FOLLOW
// ===============================
function updateCamera() {
  const mePl = players[activeUser];
  if (!mePl) return;

  const target = mePl.mesh.position;
  const dist = 10;

  camera.position.set(
    target.x - Math.sin(camRotY)*dist,
    target.y + 4 - camRotX*5,
    target.z - Math.cos(camRotY)*dist
  );
  camera.lookAt(target);
}

// ===============================
// CHAT UI
// ===============================
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");

function addChat(from, msg) {
  const div = document.createElement("div");
  div.textContent = `${from}: ${msg}`;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

chatInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const msg = chatInput.value.trim();
    if (msg !== "") {
      ws.send(JSON.stringify({ type:"chat", message:msg }));
      chatInput.value = "";
    }
  }
});

// ===============================
// WEBSOCKET CLIENT
// ===============================
const statusEl = document.getElementById("status");
const roomEl = document.getElementById("roomName");
const playerListEl = document.getElementById("playerList");

const ws = new WebSocket("ws://localhost:8080");

ws.onopen = () => {
  statusEl.textContent = "Connected";

  ws.send(JSON.stringify({
    type:"join",
    username: activeUser,
    cosmetics: me.cosmetics
  }));

  if (isMobile()) {
    document.getElementById("mobileControls").style.display = "block";
    document.getElementById("jumpBtn").style.display = "block";
  }
};

ws.onclose = () => statusEl.textContent = "Disconnected";
ws.onerror = () => statusEl.textContent = "Error";

ws.onmessage = event => {
  const msg = JSON.parse(event.data);

  if (msg.type === "state") {
    roomEl.textContent = msg.room;

    Object.keys(msg.players).forEach(u => {
      const pdata = msg.players[u];
      if (!players[u]) {
        const data = getPlayerData(u);
        createCapsule(u, data);
      }
      players[u].x = pdata.x;
      players[u].y = pdata.y;
      players[u].z = pdata.z;
      players[u].mesh.position.set(pdata.x, pdata.y, pdata.z);
    });
  }

  if (msg.type === "player_list") {
    playerListEl.innerHTML = "<b>Players:</b><br>" +
      msg.players.join("<br>");
  }

  if (msg.type === "chat") {
    addChat(msg.from, msg.message);
  }

  if (msg.type === "leave") {
    if (players[msg.username]) {
      scene.remove(players[msg.username].mesh);
      delete players[msg.username];
    }
  }
};

// ===============================
// SEND MOVEMENT
// ===============================
function sendMyState() {
  const mePl = players[activeUser];
  if (!mePl || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({
    type:"move",
    username: activeUser,
    x: mePl.x,
    y: mePl.y,
    z: mePl.z
  }));
}

// ===============================
// MAIN LOOP
// ===============================
let last = performance.now();
function loop() {
  const now = performance.now();
  const dt = (now - last)/1000;
  last = now;

  updateLocalMovement(dt);
  updateCamera();
  renderer.render(scene, camera);
  sendMyState();

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
